{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "litellm-agent-platform.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm-agent-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existing (index $existing.data "MASTER_KEY") }}
  MASTER_KEY: {{ index $existing.data "MASTER_KEY" }}
  {{- else if .Values.secrets.masterKey }}
  MASTER_KEY: {{ .Values.secrets.masterKey | b64enc | quote }}
  {{- else }}
  MASTER_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if not (include "litellm-agent-platform.databaseExternalSecret" .) }}
  DATABASE_URL: {{ include "litellm-agent-platform.databaseUrl" . | b64enc | quote }}
  {{- end }}
  LITELLM_API_KEY: {{ .Values.secrets.litellmApiKey | b64enc | quote }}
  LITELLM_API_BASE: {{ .Values.secrets.litellmApiBase | b64enc | quote }}
  {{- if and $existing (index $existing.data "CONTAINER_ENV_HARNESS_AUTH_TOKEN") }}
  CONTAINER_ENV_HARNESS_AUTH_TOKEN: {{ index $existing.data "CONTAINER_ENV_HARNESS_AUTH_TOKEN" }}
  {{- else if .Values.secrets.harnessAuthToken }}
  CONTAINER_ENV_HARNESS_AUTH_TOKEN: {{ .Values.secrets.harnessAuthToken | b64enc | quote }}
  {{- else }}
  CONTAINER_ENV_HARNESS_AUTH_TOKEN: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImage }}
  K8S_HARNESS_IMAGE: {{ .Values.k8s.harnessImage | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageOpencode }}
  K8S_HARNESS_IMAGE_OPENCODE: {{ .Values.k8s.harnessImageOpencode | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageClaudeSdk }}
  K8S_HARNESS_IMAGE_CLAUDE_SDK: {{ .Values.k8s.harnessImageClaudeSdk | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageClaudeCode }}
  K8S_HARNESS_IMAGE_CLAUDE_CODE: {{ .Values.k8s.harnessImageClaudeCode | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageCodex }}
  K8S_HARNESS_IMAGE_CODEX: {{ .Values.k8s.harnessImageCodex | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageHermes }}
  K8S_HARNESS_IMAGE_HERMES: {{ .Values.k8s.harnessImageHermes | b64enc | quote }}
  {{- end }}
  {{- if .Values.k8s.harnessImageGemini }}
  K8S_HARNESS_IMAGE_GEMINI: {{ .Values.k8s.harnessImageGemini | b64enc | quote }}
  {{- end }}
{{- end }}
